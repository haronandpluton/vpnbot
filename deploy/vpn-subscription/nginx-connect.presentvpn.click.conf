server {
    listen 80;
    listen [::]:80;
    server_name connect.presentvpn.click;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name connect.presentvpn.click;

    ssl_certificate /etc/letsencrypt/live/connect.presentvpn.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/connect.presentvpn.click/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:2097;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }
}
